name: Release
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: graalvm
          java-version: 25
      - run: ./gradlew -v
      - run: ./gradlew shadowJar
      - run: native-image -jar _tui/build/libs/euaie.jar _tui/build/libs/euaie
      - run: ls -lh _tui/build/libs/ ./
      - run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --draft \
            _tui/build/libs/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
