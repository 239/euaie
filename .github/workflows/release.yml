name: release
on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ] #macos-latest, windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community # liberica?
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl: false
          native-image-job-reports: true
      - run: ./gradlew -v
      #- run: ./gradlew shadowJar
      - run: ./gradlew nativeCompile
      #- run: native-image --static-nolibc -jar _tui/build/jar/euaie.jar _tui/build/jar/euaie-static-nolibc
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.os }}
          path: _tui/build/native/nativeCompile/*
          #archive: false
      - uses: actions/upload-artifact@v7
        if: matrix.os == 'ubuntu-latest'
        with:
          name: jar
          path: _tui/build/jar/*
          #archive: false
  create:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - run: ls -R artifacts/
      - run: chmod +x artifacts/*
      - run: find artifacts/ -type f -execdir upx -o {}-upx {} \;
      - run: file artifacts/*
      - run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --draft \
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
