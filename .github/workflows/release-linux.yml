name: release-linux
on:
  workflow_dispatch
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl: false
          native-image-job-reports: true
      - run: ./gradlew -v
      - run: ./gradlew shadowJar
      - run: ./gradlew nativeCompile
      - run: ls -lh _tui/build/jar/ _tui/build/native/nativeCompile/
      - run: find _tui/build/native/nativeCompile/ -type f -execdir upx -o {}-upx {} \;
      - run: file _tui/build/native/nativeCompile/*
      - run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --draft \
            _tui/build/jar/* \
            _tui/build/native/nativeCompile/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
