name: Release
on:
  workflow_dispatch:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --draft \
  build:
    needs: create
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest ] #macos-latest, windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: 25
          distribution: graalvm-community # liberica?
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-musl: false
          native-image-job-reports: true
      - run: ./gradlew -v
      - run: ./gradlew shadowJar
      - run: ./gradlew nativeCompile
      #- run: native-image --static-nolibc -jar _tui/build/jar/euaie.jar _tui/build/jar/euaie-static-nolibc
      #- run: ls -lh _tui/build/jar/ _tui/build/native/nativeCompile/
      #- run: find _tui/build/native/nativeCompile/ -type f -execdir upx -o {}-upx {} \;
      #- run: file _tui/build/native/nativeCompile/*
      - run: |
          gh release upload "${{ github.ref_name }}" \
            _tui/build/jar/* \
            _tui/build/native/nativeCompile/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
#      - uses: actions/upload-artifact@v4
#        with:
#          name: helloworld-${{ matrix.os }}
#          path: helloworld*
